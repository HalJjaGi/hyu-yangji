name: hyu_yangji
description: 한양대학교 서울 캠퍼스 주변 장소 추천 앱
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  
  # State Management
  provider: ^6.0.5
  
  # Network & API
  http: ^1.1.0
  dio: ^5.3.2
  
  # Map
  flutter_naver_map: ^1.2.0+1
  flutter_naver_map_web: ^0.0.2
  flutter_map: ^5.0.0
  latlong2: ^0.9.0
  
  # UI Components
  flutter_staggered_grid_view: ^0.7.0
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.7
  google_fonts: ^6.1.0
  webview_flutter: ^4.7.0
  
  # Utilities
  # url_launcher: ^6.1.14  # 임시 주석 처리
  # share_plus: ^7.2.1  # 임시 주석 처리
  
  # Data
  json_annotation: ^4.8.1
  
  # Platform Specific
  flutter_web_plugins:
    sdk: flutter
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/images/
    - assets/data/
    
  # Fonts
  fonts:
    - family: NotoSansKR
      fonts:
        - asset: assets/fonts/noto/NotoSansKR-Regular.ttf
        - asset: assets/fonts/noto/NotoSansKR-Bold.ttf
          weight: 700