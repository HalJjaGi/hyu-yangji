events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log  /var/log/nginx/access.log  combined;
    error_log   /var/log/nginx/error.log;

    # Basic settings
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Server configuration
    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        
        # Ensure JSON files are served correctly
        location ~ \.json$ {
            add_header Content-Type application/json;
            try_files $uri =404;
        }
        
        # Ensure icon files are served correctly
        location ~* \.(png|jpg|jpeg|gif|ico)$ {
            add_header Content-Type image/png;
            try_files $uri =404;
        }
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Cache static files
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Content-Type $content_type;
        }
        
        # Special handling for PWA icons
        location /icons/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin *;
            add_header Content-Type image/png;
            try_files $uri =404;
        }

        # HTML files - no cache
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # API endpoints - return 404 for now instead of HTML
        location /api/ {
            return 404;
        }
        
        # Static assets (images, css, js)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }
        
        # Flutter assets (JSON files)
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Content-Type application/json;
            try_files $uri =404;
        }
        
        # Font files
        location /fonts/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin *;
            add_header Content-Type font/woff2;
            add_header Content-Type font/ttf;
            try_files $uri =404;
        }
        
        # Fallback for missing fonts (return 204 to avoid 404 errors)
        location ~* \.(ttf|woff|woff2|eot|otf)$ {
            try_files $uri =204;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin *;
        }
        
        # Flutter main asset files
        location = /assets/FontManifest.json {
            add_header Content-Type application/json;
            add_header Cache-Control "public, immutable";
            try_files $uri /assets/FontManifest.json =404;
        }
        
        # Favicon fallback - return 204 if not found
        location = /favicon.ico {
            try_files $uri =204;
        }
        
        # HTML files - no cache
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
            try_files $uri =404;
        }
        
        # Fallback to index.html for SPA (only for non-API, non-static requests)
        location / {
            add_header Content-Type text/html;
            try_files $uri $uri/ /index.html;
        }

        # Health check endpoint
        location /health {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status": "healthy", "version": "1.0.0", "timestamp": "$time_local"}';
        }
    }
}